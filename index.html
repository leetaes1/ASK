<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE BEAST TYPE TEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-bg: #4453a4; 
            --bar-gauge: #5466b5; 
            --progress-fill: #232948;
            --progress-bg: #43497b;
            --btn-bg-main: #232948;
            --btn-text-main: #5666af;
            --window-bg: #000000; 
            --text-black: #000000; 
        }

        body { background-color: var(--window-bg); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
        
        #main-container { 
            width: 100vw; height: 100vh; background-color: var(--main-bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; position: relative; overflow: hidden; 
        }

        #main-container::before { 
            content: ""; position: absolute; bottom: -150px; right: -200px; 
            width: 950px; height: 950px; background-image: url('logo2.png'); background-size: contain; 
            background-repeat: no-repeat; background-position: center; 
            filter: brightness(0) saturate(100%) invert(32%) sepia(16%) border-left(10%) hue-rotate(195deg) brightness(95%) contrast(85%);
            opacity: 1.0; z-index: 0; pointer-events: none; 
            transform: rotate(12deg);
        }

        #main-container::after { 
            content: ""; position: absolute; top: -150px; left: -200px; 
            width: 950px; height: 950px; background-image: url('logo2.png'); background-size: contain; 
            background-repeat: no-repeat; background-position: center; 
            filter: brightness(0) saturate(100%) invert(32%) sepia(16%) border-left(10%) hue-rotate(195deg) brightness(95%) contrast(85%);
            opacity: 1.0; z-index: 0; pointer-events: none; 
            transform: scaleX(-1) rotate(-12deg);
        }

        .inner-content { width: 100%; max-width: 550px; position: relative; z-index: 10; height: 95vh; display: flex; flex-direction: column; }
        .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .page.active { display: flex; text-align: center; }

        #page-result.active { overflow-y: auto; justify-content: center; padding: 20px 10px; }
        #page-guestbook.active { display: flex; flex-direction: column; justify-content: flex-start; overflow: hidden; height: 100%; }
        
        .page::-webkit-scrollbar { width: 4px; }
        .page::-webkit-scrollbar-thumb { background: var(--btn-bg-main); border-radius: 10px; }

        .result-wrapper { width: 100%; margin: auto 0; display: flex; flex-direction: column; align-items: center; }

        .gb-fixed-header { width: 100%; height: 50vh; display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; z-index: 100; margin-bottom: -50px; }
        .gb-scroll-area { flex-grow: 1; overflow-y: auto; width: 100%; padding: 0 5px; box-sizing: border-box; }
        .gb-scroll-area::-webkit-scrollbar { width: 4px; }
        .gb-scroll-area::-webkit-scrollbar-thumb { background: var(--text-black); border-radius: 10px; }
        .gb-fixed-footer { width: 100%; flex-shrink: 0; padding: 10px 0 25px 0; z-index: 100; }

        .main-logo { width: 100%; max-width: 350px; height: auto; margin-bottom: 25px; filter: none; opacity: 1.0; }
        .sub-logo { width: 100%; height: auto; margin-bottom: 20px; filter: none; display: block; }
        
        h2 { font-weight: 900; font-size: 1.6rem; text-align: left; margin-bottom: 30px; letter-spacing: -0.02em; padding: 0 10px; width: 100%; word-break: keep-all; }
        .progress-container { width: 100%; margin-bottom: 30px; }
        .progress-info { display: flex; justify-content: space-between; font-weight: 900; font-size: 0.9rem; margin-bottom: 8px; }
        .main-progress-bg { width: 100%; height: 12px; background-color: var(--progress-bg); border-radius: 6px; overflow: hidden; }
        .main-progress-fill { height: 100%; background-color: var(--progress-fill); transition: width 0.5s ease; }

        .opt-btn { width: 100%; position: relative; background: transparent; border: 3px solid var(--text-black); padding: 18px; margin-bottom: 12px; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; z-index: 20; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; color: var(--text-black); font-weight: 900; border-radius: 6px; text-align: left; }
        .opt-btn:disabled { cursor: default; opacity: 0.8; }
        .btn-fill { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background-color: var(--bar-gauge); z-index: -1; transition: width 0.6s ease; }
        .stat-text { font-weight: 900; font-size: 1rem; pointer-events: none; margin-left: 10px; flex-shrink: 0; }
        .main-btn { margin-top: 25px; padding: 15px 45px; background: var(--btn-bg-main); color: var(--btn-text-main); border: none; font-size: 1.2rem; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; border-radius: 6px; }

        .result-category { font-weight: 900; font-size: 0.9rem; letter-spacing: 0.25em; color: rgba(0,0,0,0.7); display: block; margin-bottom: 1px; }
        .result-name { font-weight: 900; font-size: 3.8rem; line-height: 1; margin: 0 0 12px 0; letter-spacing: -0.03em; }
        
        .card-img-wrap { width: 100%; max-width: 460px; margin: 15px auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .card-img { width: 100%; height: auto; border-radius: 12px; display: block; }
        #result-tag { font-weight: 900; font-size: 1.35rem; color: var(--text-black); border-bottom: 4px solid var(--text-black); display: inline-block; padding-bottom: 5px; margin-bottom: 8px; }
        #result-desc { font-weight: 700; font-size: 0.95rem; color: var(--text-black); display: block; line-height: 1.4; opacity: 0.9; }

        /* [수정] 결과 페이지 하단 참여 비율 바 컬러 수정 (#232948) */
        .total-stats { margin: 15px 0 10px 0; padding: 18px; background: rgba(0,0,0,0.05); border-radius: 10px; text-align: left; width: 100%; box-sizing: border-box; }
        .stat-header { font-weight: 900; font-size: 1.1rem; display: block; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 12px; }
        .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 0.9rem; font-weight: 900; }
        .stat-name { width: 60px; flex-shrink: 0; } 
        .stat-bar-bg { flex-grow: 1; height: 9px; background: rgba(0,0,0,0.1); margin: 0 12px; border-radius: 5px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: #232948; width: 0%; transition: width 1s ease; }
        .stat-percent { width: 45px; text-align: right; flex-shrink: 0; }

        .gb-title { font-weight: 900; font-size: 2.2rem; margin-bottom: 20px; display: block; color: var(--text-black); text-align: left; padding-left: 5px; width: 100%; }
        .gb-input-box { display: flex; gap: 10px; margin-bottom: 12px; width: 100%; }
        .gb-input { flex-grow: 1; padding: 15px; border: 3px solid var(--text-black); border-radius: 6px; font-family: inherit; font-weight: 900; font-size: 1rem; outline: none; background: rgba(255,255,255,0.1); color: var(--text-black); }
        .gb-input::placeholder { color: rgba(0,0,0,0.6); font-weight: 700; } 
        .gb-submit { background: var(--btn-bg-main); color: var(--btn-text-main); border: none; padding: 0 25px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 1rem; }
        
        .gb-list { list-style: none; padding: 0; margin: 0; text-align: left; width: 100%; }
        .gb-item { background: transparent; padding: 15px; border: 3px solid var(--text-black); border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; }
        .gb-head-wrap { width: 55px; height: 55px; margin-right: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gb-head-img { width: 95%; height: 95%; object-fit: contain; }
        .gb-divider { width: 2px; height: 25px; background-color: var(--text-black); margin-right: 15px; opacity: 0.3; }
        .gb-content-wrap { flex-grow: 1; }
        .gb-msg { font-weight: 900; font-size: 1.05rem; color: var(--text-black); display: block; margin-bottom: 3px; word-break: break-all; }
        .gb-time { font-size: 0.75rem; color: rgba(0,0,0,0.5); font-weight: 700; }
        
        /* [수정] 방명록 하단 페이지네이션 컬러 수정 (#232948) */
        .pagination { display: flex; justify-content: center; gap: 8px; margin: 0; width: 100%; }
        .pg-btn { width: 38px; height: 38px; border: 3px solid #232948; background: transparent; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-family: inherit; color: #232948; }
        .pg-btn.active { background: #232948; color: var(--btn-text-main); }
        .pg-btn:disabled { opacity: 0.3; cursor: default; }

        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--main-bg); border: 4px solid var(--text-black); border-radius: 12px; padding: 30px; text-align: center; max-width: 320px; width: 80%; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .modal-text { font-weight: 900; font-size: 1.3rem; color: var(--text-black); margin-bottom: 25px; display: block; line-height: 1.4; }
        .modal-btn-group { display: flex; gap: 12px; justify-content: center; }
        .modal-btn { padding: 12px 20px; border: 3px solid var(--text-black); border-radius: 6px; font-weight: 900; font-size: 1rem; cursor: pointer; flex: 1; }
        .modal-btn.confirm { background: var(--btn-bg-main); color: var(--btn-text-main); }
        .modal-btn.cancel { background: transparent; color: var(--text-black); }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="inner-content">
            <div id="page-start" class="page active">
                <img src="logo.png" alt="Logo" class="main-logo">
                <p style="font-weight: 900; font-size: 1.25rem; margin-bottom: 15px; color: var(--text-black);">나의 유행 소비 스타일 찾기</p>
                <button class="main-btn" onclick="nextPage('q1')">시작하기</button>
            </div>

            <!-- 질문 페이지들 -->
            <div id="page-q1" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container"><div class="progress-info"><span>Q 1 / 4</span><span>25%</span></div><div class="main-progress-bg"><div class="main-progress-fill" style="width: 25%;"></div></div></div>
                <h2>Q1. 사고 싶은 게 출시되면 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q1', 'a')"><span>A. 반응을 보고 결정한다</span><div class="btn-fill" id="bar-q1-a"></div><span class="stat-text" id="text-q1-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'b')"><span>B. 바로 선점하는 게 좋다</span><div class="btn-fill" id="bar-q1-b"></div><span class="stat-text" id="text-q1-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'c')"><span>C. 혼자 고민을 깊게 한다</span><div class="btn-fill" id="bar-q1-c"></div><span class="stat-text" id="text-q1-c"></span></button>
            </div>
            <div id="page-q2" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container"><div class="progress-info"><span>Q 2 / 4</span><span>50%</span></div><div class="main-progress-bg"><div class="main-progress-fill" style="width: 50%;"></div></div></div>
                <h2>Q2. 두쫀쿠, 버터떡 등, 유행 디저트를 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q2', 'a')"><span>A. 사람들이 많이 먹으면 사서 먹어본다</span><div class="btn-fill" id="bar-q2-a"></div><span class="stat-text" id="text-q2-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'b')"><span>B. 뜨자마자 바로 먹어본다</span><div class="btn-fill" id="bar-q2-b"></div><span class="stat-text" id="text-q2-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'c')"><span>C. 유행이든 아니든, 내가 끌려야 먹는다</span><div class="btn-fill" id="bar-q2-c"></div><span class="stat-text" id="text-q2-c"></span></button>
            </div>
            <div id="page-q3" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container"><div class="progress-info"><span>Q 3 / 4</span><span>75%</span></div><div class="main-progress-bg"><div class="main-progress-fill" style="width: 75%;"></div></div></div>
                <h2>Q3. 새로운 음악을 접할 때 나는…</h2>
                <button class="opt-btn" onclick="handleSelect('q3', 'a')"><span>A. 플리나 SNS를 보다가 발견한 노래를 듣는다</span><div class="btn-fill" id="bar-q3-a"></div><span class="stat-text" id="text-q3-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'b')"><span>B. 좋아하는 아티스트의 신곡이 나오는대로 들어본다</span><div class="btn-fill" id="bar-q3-b"></div><span class="stat-text" id="text-q3-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'c')"><span>C. 취향껏 디깅해서 듣는다</span><div class="btn-fill" id="bar-q3-c"></div><span class="stat-text" id="text-q3-c"></span></button>
            </div>
            <div id="page-q4" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container"><div class="progress-info"><span>Q 4 / 4</span><span>100%</span></div><div class="main-progress-bg"><div class="main-progress-fill" style="width: 100%;"></div></div></div>
                <h2>Q4. 나에게 더 중요한 것은..</h2>
                <button class="opt-btn" onclick="handleSelect('q4', 'a')"><span>A. 소속감과 관계</span><div class="btn-fill" id="bar-q4-a"></div><span class="stat-text" id="text-q4-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'b')"><span>B. 빠름과 새로움</span><div class="btn-fill" id="bar-q4-b"></div><span class="stat-text" id="text-q4-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'c')"><span>C. 취향과 기준</span><div class="btn-fill" id="bar-q4-c"></div><span class="stat-text" id="text-q4-c"></span></button>
            </div>

            <!-- 결과 페이지 -->
            <div id="page-result" class="page">
                <div class="result-wrapper">
                    <div class="result-header">
                        <span class="result-category">TYPE</span>
                        <h1 id="result-name" class="result-name">NAME</h1>
                    </div>
                    <div class="card-img-wrap"><img src="" alt="ID Card" id="result-card" class="card-img"></div>
                    <div id="result-tag-container">
                        <div id="result-tag">태그</div>
                        <div id="result-desc">설명</div>
                    </div>
                    <div class="total-stats">
                        <span class="stat-header" id="total-participation-text">현재 0명이 참여했습니다</span>
                        <div class="stat-row"><span class="stat-name">KRU</span><div class="stat-bar-bg"><div id="bar-total-a" class="stat-bar-fill"></div></div><span id="percent-total-a" class="stat-percent">0%</span></div>
                        <div class="stat-row"><span class="stat-name">MAX</span><div class="stat-bar-bg"><div id="bar-total-b" class="stat-bar-fill"></div></div><span id="percent-total-b" class="stat-percent">0%</span></div>
                        <div class="stat-row"><span class="stat-name">HUGO</span><div class="stat-bar-bg"><div id="bar-total-c" class="stat-bar-fill"></div></div><span id="percent-total-c" class="stat-percent">0%</span></div>
                    </div>
                    <button class="main-btn" onclick="nextPage('guestbook')">방명록 남기기</button>
                </div>
            </div>

            <!-- 방명록 페이지 -->
            <div id="page-guestbook" class="page">
                <div class="gb-fixed-header">
                    <span class="gb-title">GUESTBOOK</span>
                    <div class="gb-input-box">
                        <input type="text" id="gb-input-field" class="gb-input" placeholder="방명록을 남겨주세요." maxlength="60">
                        <button class="gb-submit" onclick="showModal()">전송</button>
                    </div>
                    <button class="main-btn" style="margin: 0; width: 100%; padding: 15px; font-weight: 700;" onclick="resetTest()">처음으로 (다시하기)</button>
                </div>
                <div class="gb-scroll-area" id="gb-scroll-container">
                    <div id="gb-list-container" class="gb-list"></div>
                </div>
                <div class="gb-fixed-footer">
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 모달 -->
    <div id="custom-modal">
        <div class="modal-content">
            <span class="modal-text">방명록을<br>등록하시겠습니까?</span>
            <div class="modal-btn-group">
                <button class="modal-btn cancel" onclick="closeModal()">취소</button>
                <button class="modal-btn confirm" onclick="confirmSubmit()">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdSXJJ2grh1GNA_vusNJRm9djRpRH1ggo",
            authDomain: "hype-4bb91.firebaseapp.com",
            projectId: "hype-4bb91",
            storageBucket: "hype-4bb91.firebasestorage.app",
            messagingSenderId: "165143291283",
            appId: "1:165143291283:web:000e48b6091aa0a1c5b466",
            measurementId: "G-0Q8QJ5YDP4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let userAnswers = { a: 0, b: 0, c: 0 };
        let answerHistory = [];
        let isProcessing = false;
        let currentResultHead = ""; 
        let allGuestMessages = [];
        let currentPage = 1;
        const itemsPerPage = 15;

        window.nextPage = function(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + pId);
            target.classList.add('active');
            isProcessing = false;
        };

        window.resetTest = function() {
            userAnswers = { a: 0, b: 0, c: 0 };
            answerHistory = [];
            currentResultHead = ""; 
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = false);
            document.querySelectorAll('.btn-fill').forEach(f => f.style.width = "0%");
            document.querySelectorAll('.stat-text').forEach(t => t.innerText = "");
            document.getElementById('gb-input-field').value = "";
            currentPage = 1;
            nextPage('start');
        };

        window.showModal = function() {
            const msg = document.getElementById('gb-input-field').value.trim();
            if(!msg) return;
            document.getElementById('custom-modal').style.display = 'flex';
        };

        window.closeModal = function() { document.getElementById('custom-modal').style.display = 'none'; };

        window.confirmSubmit = async function() {
            closeModal();
            const input = document.getElementById('gb-input-field');
            const msg = input.value.trim();
            try {
                await addDoc(collection(db, "guestbook"), {
                    headImg: currentResultHead, 
                    message: msg,
                    timestamp: serverTimestamp()
                });
                input.value = "";
            } catch(e) { console.error(e); }
        };

        const q = query(collection(db, "guestbook"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            allGuestMessages = [];
            snap.forEach((doc) => { allGuestMessages.push(doc.data()); });
            renderGuestbook();
        });

        function renderGuestbook() {
            const container = document.getElementById('gb-list-container');
            const paginationContainer = document.getElementById('pagination');
            container.innerHTML = ""; paginationContainer.innerHTML = "";
            const totalItems = allGuestMessages.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const currentData = allGuestMessages.slice(startIndex, startIndex + itemsPerPage);

            currentData.forEach((data) => {
                const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                const item = document.createElement('div');
                item.className = 'gb-item';
                let headImg = data.headImg || "head1.png"; 
                item.innerHTML = `
                    <div class="gb-head-wrap"><img src="${headImg}" class="gb-head-img"></div>
                    <div class="gb-divider"></div>
                    <div class="gb-content-wrap">
                        <span class="gb-msg">${data.message}</span>
                        <span class="gb-time">${timeStr}</span>
                    </div>`;
                container.appendChild(item);
            });

            if (totalPages > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'pg-btn'; prevBtn.innerText = '<';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; renderGuestbook(); document.getElementById('gb-scroll-container').scrollTop = 0; };
                paginationContainer.appendChild(prevBtn);
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.className = `pg-btn ${i === currentPage ? 'active' : ''}`;
                    btn.innerText = i;
                    btn.onclick = () => { currentPage = i; renderGuestbook(); document.getElementById('gb-scroll-container').scrollTop = 0; };
                    paginationContainer.appendChild(btn);
                }
                const nextBtn = document.createElement('button');
                nextBtn.className = 'pg-btn'; nextBtn.innerText = '>';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; renderGuestbook(); document.getElementById('gb-scroll-container').scrollTop = 0; };
                paginationContainer.appendChild(nextBtn);
            }
        }

        window.handleSelect = async function(qId, optId) {
            if (isProcessing) return;
            isProcessing = true;
            const currentButtons = document.querySelectorAll(`#page-${qId} .opt-btn`);
            currentButtons.forEach(btn => btn.disabled = true);
            userAnswers[optId]++;
            answerHistory.push(optId); 
            const statsRef = doc(db, "surveyStats", qId);
            try {
                await updateDoc(statsRef, { [optId.toUpperCase()]: increment(1) });
                const snap = await getDoc(statsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const total = (data.A||0)+(data.B||0)+(data.C||0);
                    ['a','b','c'].forEach(o => {
                        const count = data[o.toUpperCase()] || 0;
                        const p = total > 0 ? Math.round((count/total)*100) : 0;
                        const fillBar = document.getElementById(`bar-${qId}-${o}`);
                        if(fillBar) fillBar.style.width = p + "%";
                        const textSpan = document.getElementById(`text-${qId}-${o}`);
                        if(textSpan) textSpan.innerText = p + "%";
                    });
                }
                setTimeout(() => {
                    if (qId === 'q1') nextPage('q2');
                    else if (qId === 'q2') nextPage('q3');
                    else if (qId === 'q3') nextPage('q4');
                    else if (qId === 'q4') calculateResult();
                }, 1000);
            } catch (e) { console.error(e); isProcessing = false; }
        };

        async function calculateResult() {
            nextPage('result');
            const { a, b, c } = userAnswers;
            const maxVal = Math.max(a, b, c);
            const candidates = [];
            if (a === maxVal) candidates.push('a');
            if (b === maxVal) candidates.push('b');
            if (c === maxVal) candidates.push('c');
            let finalType = (candidates.length === 1) 
                ? candidates[0] 
                : answerHistory.slice().reverse().find(ans => candidates.includes(ans));
            
            const nameEl = document.getElementById('result-name');
            const tagEl = document.getElementById('result-tag');
            const descEl = document.getElementById('result-desc');
            const cardEl = document.getElementById('result-card');

            if (finalType === 'a') { 
                nameEl.innerText = "KRU"; cardEl.src = "card1.png"; tagEl.innerText = "공감과 소속"; 
                descEl.innerText = "집단의 흐름 속에서 함께 선택하는 방식"; currentResultHead = "head1.png"; 
            } else if (finalType === 'b') { 
                nameEl.innerText = "MAX"; cardEl.src = "card2.png"; tagEl.innerText = "유행의 선점"; 
                descEl.innerText = "누구보다 빠르게 트렌드를 선택하는 방식"; currentResultHead = "head2.png"; 
            } else { 
                nameEl.innerText = "HUGO"; cardEl.src = "card3.png"; tagEl.innerText = "취향의 독립"; 
                descEl.innerText = "자신만의 기준으로 소비를 결정하는 방식"; currentResultHead = "head3.png"; 
            }

            const q1Snap = await getDoc(doc(db, "surveyStats", "q1"));
            if (q1Snap.exists()) {
                const d = q1Snap.data();
                const total = (d.A||0)+(d.B||0)+(d.C||0);
                document.getElementById('total-participation-text').innerText = `현재 ${total}명이 참여했습니다`;
                ['A','B','C'].forEach(id => {
                    const count = d[id] || 0;
                    const p = total > 0 ? Math.round((count/total)*100) : 0;
                    document.getElementById(`bar-total-${id.toLowerCase()}`).style.width = p+"%";
                    document.getElementById(`percent-total-${id.toLowerCase()}`).innerText = p+"%";
                });
            }
        }
    </script>
</body>
</html>
