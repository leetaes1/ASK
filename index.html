<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE BEAST TYPE TEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-bg: #4253A4; --bar-bg: #5367c9; --btn-dark-navy: #1B2450; 
            --text-black: #000000; --window-bg: #000000; 
            --progress-bg-solid: #2D3A75; --progress-fill: #1B2450;
        }

        body { background-color: var(--window-bg); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
        
        #main-container { 
            width: 100vw; height: 100vh; background-color: var(--main-bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; position: relative; overflow: hidden; 
        }

        #main-container::before { 
            content: ""; position: absolute; top: 50%; right: -300px; transform: translateY(-50%); 
            width: 900px; height: 900px; background-image: url('logo2.png'); background-size: contain; 
            background-repeat: no-repeat; background-position: center; filter: brightness(0); opacity: 0.2; z-index: 0; pointer-events: none; 
        }

        .inner-content { width: 100%; max-width: 550px; position: relative; z-index: 10; height: 90vh; display: flex; flex-direction: column; justify-content: center; }
        .page { display: none; }
        .page.active { display: block; text-align: center; }

        #page-result.active, #page-guestbook.active { overflow-y: auto; height: 100%; padding-right: 5px; }
        .page::-webkit-scrollbar { width: 4px; }
        .page::-webkit-scrollbar-thumb { background: var(--btn-dark-navy); border-radius: 10px; }

        .main-logo { width: 100%; max-width: 350px; height: auto; margin-bottom: 20px; filter: brightness(0); opacity: 1.0; }
        .sub-logo { width: 100%; height: auto; margin-bottom: 15px; filter: brightness(0); display: block; }

        h2 { font-weight: 900; font-size: 1.6rem; text-align: left; margin-bottom: 25px; letter-spacing: -0.02em; padding: 0 10px; }

        .progress-container { width: 100%; margin-bottom: 25px; }
        .progress-info { display: flex; justify-content: space-between; font-weight: 900; font-size: 0.9rem; margin-bottom: 8px; }
        .main-progress-bg { width: 100%; height: 12px; background-color: var(--progress-bg-solid); border-radius: 6px; overflow: hidden; }
        .main-progress-fill { height: 100%; background-color: var(--progress-fill); transition: width 0.5s ease; }

        .opt-btn { 
            width: 100%; position: relative; background: transparent; border: 3px solid var(--text-black); 
            padding: 18px; margin-bottom: 12px; font-size: 1.1rem; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
            overflow: hidden; font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text-black); font-weight: 900; border-radius: 6px; 
        }
        .opt-btn:disabled { cursor: default; opacity: 0.8; }
        .btn-fill { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background-color: var(--bar-bg); z-index: -1; transition: width 0.6s ease; }
        .stat-text { font-weight: 900; font-size: 1rem; pointer-events: none; }

        .main-btn { margin-top: 15px; padding: 12px 40px; background: var(--btn-dark-navy); color: #fff; border: none; font-size: 1.1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.1em; border-radius: 6px; }

        /* 결과 화면 디자인 수정 */
        .result-category { font-weight: 900; font-size: 0.8rem; letter-spacing: 0.2em; color: rgba(0,0,0,0.7); display: block; margin-top: 5px; margin-bottom: -8px; }
        .result-name { font-weight: 900; font-size: 3.5rem; line-height: 1; margin: 0; letter-spacing: -0.03em; }
        
        .card-img-wrap { width: 100%; max-width: 440px; margin: 10px auto; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.25)); }
        .card-img { width: 100%; height: auto; border-radius: 12px; display: block; }
        
        #result-tag-container { margin-top: 2px; margin-bottom: 2px; }
        #result-tag { font-weight: 900; font-size: 1.2rem; color: var(--text-black); border-bottom: 3px solid var(--text-black); display: inline-block; padding-bottom: 3px; margin-bottom: 5px; }
        #result-desc { font-weight: 700; font-size: 0.9rem; color: var(--text-black); display: block; line-height: 1.3; opacity: 0.9; }

        .total-stats { margin: 15px 0 5px 0; padding: 15px; background: rgb(220, 220, 220); border-radius: 10px; text-align: left; }
        .stat-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; font-weight: 900; }
        .stat-name { width: 55px; flex-shrink: 0; } 
        .stat-bar-bg { flex-grow: 1; height: 8px; background: rgba(0,0,0,0.15); margin: 0 12px; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: #000; width: 0%; transition: width 1s ease; }
        .stat-percent { width: 40px; text-align: right; flex-shrink: 0; }

        /* 방명록 섹션 디자인 */
        .gb-title { font-weight: 900; font-size: 2.2rem; margin-bottom: 25px; display: block; color: var(--text-black); text-align: left; padding-left: 5px; }
        .gb-input-box { display: flex; gap: 10px; margin-bottom: 12px; }
        .gb-input { flex-grow: 1; padding: 15px; border: 3px solid var(--text-black); border-radius: 6px; font-family: inherit; font-weight: 900; font-size: 1rem; outline: none; background: rgba(255,255,255,0.1); color: var(--text-black); }
        .gb-input::placeholder { color: rgba(0,0,0,0.6); font-weight: 700; } 
        .gb-submit { background: var(--text-black); color: white; border: none; padding: 0 25px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 1rem; }
        
        .gb-list { list-style: none; padding: 0; margin: 0; text-align: left; }
        .gb-item { background: transparent; padding: 18px; border: 3px solid var(--text-black); border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; }
        .gb-emoji { font-size: 1.6rem; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; }
        .gb-divider { width: 2px; height: 20px; background-color: var(--text-black); margin-right: 15px; opacity: 0.3; }
        .gb-content-wrap { flex-grow: 1; }
        .gb-msg { font-weight: 900; font-size: 1.05rem; color: var(--text-black); display: block; margin-bottom: 3px; word-break: break-all; }
        .gb-time { font-size: 0.75rem; color: rgba(0,0,0,0.5); font-weight: 700; }

        /* 커스텀 모달 UI */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--main-bg); border: 4px solid var(--text-black); border-radius: 12px; padding: 30px; text-align: center; max-width: 300px; width: 80%; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .modal-text { font-weight: 900; font-size: 1.2rem; color: var(--text-black); margin-bottom: 20px; display: block; line-height: 1.4; }
        .modal-btn-group { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border: 3px solid var(--text-black); border-radius: 6px; font-weight: 900; font-size: 0.9rem; cursor: pointer; flex: 1; }
        .modal-btn.confirm { background: var(--text-black); color: white; }
        .modal-btn.cancel { background: transparent; color: var(--text-black); }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="inner-content">
            <div id="page-start" class="page active">
                <img src="logo.png" alt="Logo" class="main-logo">
                <p style="font-weight: 900; font-size: 1.2rem; margin-bottom: 10px; color: var(--text-black);">나의 유행 소비 스타일 찾기</p>
                <button class="main-btn" onclick="nextPage('q1')">시작하기</button>
            </div>

            <div id="page-q1" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 1 / 4</span><span>25%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 25%;"></div></div>
                </div>
                <h2>Q1. 사고 싶은 게 출시되면 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q1', 'a')"><span>A. 바로 선점하는 게 좋다</span><div class="btn-fill" id="bar-q1-a"></div><span class="stat-text" id="text-q1-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'b')"><span>B. 혼자 고민을 깊게 한다</span><div class="btn-fill" id="bar-q1-b"></div><span class="stat-text" id="text-q1-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'c')"><span>C. 반응을 보고 결정한다</span><div class="btn-fill" id="bar-q1-c"></div><span class="stat-text" id="text-q1-c"></span></button>
            </div>

            <div id="page-q2" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 2 / 4</span><span>50%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 50%;"></div></div>
                </div>
                <h2>Q2. 스타일을 선택할 때..</h2>
                <button class="opt-btn" onclick="handleSelect('q2', 'a')"><span>A. 최신 트렌드를 따른다</span><div class="btn-fill" id="bar-q2-a"></div><span class="stat-text" id="text-q2-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'b')"><span>B. 나만의 기준을 따른다</span><div class="btn-fill" id="bar-q2-b"></div><span class="stat-text" id="text-q2-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'c')"><span>C. 집단의 스타일을 따른다</span><div class="btn-fill" id="bar-q2-c"></div><span class="stat-text" id="text-q2-c"></span></button>
            </div>

            <div id="page-q3" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 3 / 4</span><span>75%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 75%;"></div></div>
                </div>
                <h2>Q3. 나에게 더 중요한 것은..</h2>
                <button class="opt-btn" onclick="handleSelect('q3', 'a')"><span>A. 빠름과 새로움</span><div class="btn-fill" id="bar-q3-a"></div><span class="stat-text" id="text-q3-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'b')"><span>B. 취향과 기준</span><div class="btn-fill" id="bar-q3-b"></div><span class="stat-text" id="text-q3-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'c')"><span>C. 소속감과 관계</span><div class="btn-fill" id="bar-q3-c"></div><span class="stat-text" id="text-q3-c"></span></button>
            </div>

            <div id="page-q4" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 4 / 4</span><span>100%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 100%;"></div></div>
                </div>
                <h2>Q4. 새로 산 아이템을 장착한 날, 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q4', 'a')"><span>A. 이미 다음 트렌드를 찾아보고 있다</span><div class="btn-fill" id="bar-q4-a"></div><span class="stat-text" id="text-q4-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'b')"><span>B. 남의 시선보다 내 만족에 집중한다</span><div class="btn-fill" id="bar-q4-b"></div><span class="stat-text" id="text-q4-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'c')"><span>C. SNS나 커뮤니티의 반응을 확인한다</span><div class="btn-fill" id="bar-q4-c"></div><span class="stat-text" id="text-q4-c"></span></button>
            </div>

            <div id="page-result" class="page">
                <div class="result-header">
                    <span class="result-category">TYPE</span>
                    <h1 id="result-name" class="result-name">NAME</h1>
                </div>
                <div class="card-img-wrap">
                    <img src="" alt="ID Card" id="result-card" class="card-img">
                </div>
                <div id="result-tag-container">
                    <div id="result-tag">태그</div>
                    <div id="result-desc">설명</div>
                </div>
                
                <div class="total-stats">
                    <div class="stat-row"><span class="stat-name">MAX</span><div class="stat-bar-bg"><div id="bar-total-a" class="stat-bar-fill"></div></div><span id="percent-total-a" class="stat-percent">0%</span></div>
                    <div class="stat-row"><span class="stat-name">HUGO</span><div class="stat-bar-bg"><div id="bar-total-b" class="stat-bar-fill"></div></div><span id="percent-total-b" class="stat-percent">0%</span></div>
                    <div class="stat-row"><span class="stat-name">KRU</span><div class="stat-bar-bg"><div id="bar-total-c" class="stat-bar-fill"></div></div><span id="percent-total-c" class="stat-percent">0%</span></div>
                </div>
                <button class="main-btn" onclick="nextPage('guestbook')">방명록 남기기</button>
            </div>

            <div id="page-guestbook" class="page">
                <span class="gb-title">GUESTBOOK</span>
                <div class="gb-input-box">
                    <input type="text" id="gb-input-field" class="gb-input" placeholder="짧은 인사를 남겨주세요." maxlength="60">
                    <button class="gb-submit" onclick="showModal()">전송</button>
                </div>
                <button class="main-btn" style="margin: 0 0 25px 0; background: #555; width: 100%; padding: 15px; font-weight: 700;" onclick="resetTest()">처음으로 (다시하기)</button>
                <div id="gb-list-container" class="gb-list" style="margin-bottom: 30px;"></div>
            </div>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <span class="modal-text">방명록을<br>등록하시겠습니까?</span>
            <div class="modal-btn-group">
                <button class="modal-btn cancel" onclick="closeModal()">취소</button>
                <button class="modal-btn confirm" onclick="confirmSubmit()">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdSXJJ2grh1GNA_vusNJRm9djRpRH1ggo",
            authDomain: "hype-4bb91.firebaseapp.com",
            projectId: "hype-4bb91",
            storageBucket: "hype-4bb91.firebasestorage.app",
            messagingSenderId: "165143291283",
            appId: "1:165143291283:web:000e48b6091aa0a1c5b466",
            measurementId: "G-0Q8QJ5YDP4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let userAnswers = { a: 0, b: 0, c: 0 };
        let answerHistory = [];
        let isProcessing = false;
        let currentResultEmoji = ""; 

        window.nextPage = function(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active');
            isProcessing = false;
        };

        window.resetTest = function() {
            userAnswers = { a: 0, b: 0, c: 0 };
            answerHistory = [];
            currentResultEmoji = ""; 
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = false);
            document.querySelectorAll('.btn-fill').forEach(f => f.style.width = "0%");
            document.querySelectorAll('.stat-text').forEach(t => t.innerText = "");
            document.getElementById('gb-input-field').value = "";
            nextPage('start');
        };

        window.showModal = function() {
            const msg = document.getElementById('gb-input-field').value.trim();
            if(!msg) return;
            document.getElementById('custom-modal').style.display = 'flex';
        };

        window.closeModal = function() {
            document.getElementById('custom-modal').style.display = 'none';
        };

        window.confirmSubmit = async function() {
            closeModal();
            const input = document.getElementById('gb-input-field');
            const msg = input.value.trim();
            try {
                await addDoc(collection(db, "guestbook"), {
                    emoji: currentResultEmoji,
                    message: msg,
                    timestamp: serverTimestamp()
                });
                input.value = "";
            } catch(e) { console.error(e); }
        };

        const q = query(collection(db, "guestbook"), orderBy("timestamp", "desc"), limit(30));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('gb-list-container');
            container.innerHTML = "";
            snap.forEach((doc) => {
                const data = doc.data();
                const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                const timeStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours()}:${String(dateObj.getMinutes()).padStart(2,'0')}`;
                const item = document.createElement('div');
                item.className = 'gb-item';
                let emoji = data.emoji || "❓";
                item.innerHTML = `<div class="gb-emoji">${emoji}</div><div class="gb-divider"></div><div class="gb-content-wrap"><span class="gb-msg">${data.message}</span><span class="gb-time">${timeStr}</span></div>`;
                container.appendChild(item);
            });
        });

        window.handleSelect = async function(qId, optId) {
            if (isProcessing) return;
            isProcessing = true;
            const currentButtons = document.querySelectorAll(`#page-${qId} .opt-btn`);
            currentButtons.forEach(btn => btn.disabled = true);
            userAnswers[optId]++;
            answerHistory.push(optId);
            const statsRef = doc(db, "surveyStats", qId);
            try {
                await updateDoc(statsRef, { [optId.toUpperCase()]: increment(1) });
                const snap = await getDoc(statsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const total = (data.A||0)+(data.B||0)+(data.C||0);
                    ['a','b','c'].forEach(o => {
                        const count = data[o.toUpperCase()] || 0;
                        const p = total > 0 ? Math.round((count/total)*100) : 0;
                        const fillBar = document.getElementById(`bar-${qId}-${o}`);
                        if(fillBar) fillBar.style.width = p + "%";
                        const textSpan = document.getElementById(`text-${qId}-${o}`);
                        if(textSpan) textSpan.innerText = p + "%";
                    });
                }
                setTimeout(() => {
                    if (qId === 'q1') nextPage('q2');
                    else if (qId === 'q2') nextPage('q3');
                    else if (qId === 'q3') nextPage('q4');
                    else if (qId === 'q4') calculateResult();
                }, 1000);
            } catch (e) { console.error(e); isProcessing = false; }
        };

        async function calculateResult() {
            nextPage('result');
            const { a, b, c } = userAnswers;
            const maxVal = Math.max(a, b, c);
            const candidates = [];
            if (a === maxVal) candidates.push('a');
            if (b === maxVal) candidates.push('b');
            if (c === maxVal) candidates.push('c');
            let finalType = (candidates.length === 1) ? candidates[0] : answerHistory.find(ans => candidates.includes(ans));
            
            const nameEl = document.getElementById('result-name');
            const tagEl = document.getElementById('result-tag');
            const descEl = document.getElementById('result-desc');
            const cardEl = document.getElementById('result-card');

            if (finalType === 'a') { 
                nameEl.innerText = "MAX"; cardEl.src = "card1.png"; tagEl.innerText = "유행의 선점"; 
                descEl.innerText = "누구보다 빠르게 트렌드를 선택하는 방식"; currentResultEmoji = "🐆"; 
            } else if (finalType === 'b') { 
                nameEl.innerText = "HUGO"; cardEl.src = "card2.png"; tagEl.innerText = "취향의 독립"; 
                descEl.innerText = "자신만의 기준으로 소비를 결정하는 방식"; currentResultEmoji = "🦍"; 
            } else { 
                nameEl.innerText = "KRU"; cardEl.src = "card3.png"; tagEl.innerText = "공감과 소속"; 
                descEl.innerText = "집단의 흐름 속에서 함께 선택하는 방식"; currentResultEmoji = "🐺"; 
            }

            const q1Snap = await getDoc(doc(db, "surveyStats", "q1"));
            if (q1Snap.exists()) {
                const d = q1Snap.data();
                const total = (d.A||0)+(d.B||0)+(d.C||0);
                ['A','B','C'].forEach(id => {
                    const count = d[id] || 0;
                    const p = total > 0 ? Math.round((count/total)*100) : 0;
                    document.getElementById(`bar-total-${id.toLowerCase()}`).style.width = p+"%";
                    document.getElementById(`percent-total-${id.toLowerCase()}`).innerText = p+"%";
                });
            }
        }
    </script>
</body>
</html>
