<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPE BEAST TYPE TEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-bg: #4253A4; --bar-bg: #5367c9; --btn-dark-navy: #1B2450; 
            --text-black: #000000; --window-bg: #000000; 
            --progress-bg-solid: #2D3A75; --progress-fill: #1B2450;
        }

        body { background-color: var(--window-bg); margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Noto Sans KR', sans-serif; -webkit-font-smoothing: antialiased; }
        
        #main-container { 
            width: 100vw; height: 100vh; background-color: var(--main-bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; position: relative; overflow: hidden; 
        }

        #main-container::before { 
            content: ""; position: absolute; top: 50%; right: -300px; transform: translateY(-50%); 
            width: 900px; height: 900px; background-image: url('logo2.png'); background-size: contain; 
            background-repeat: no-repeat; background-position: center; filter: brightness(0); opacity: 0.2; z-index: 0; pointer-events: none; 
        }

        .inner-content { width: 100%; max-width: 550px; position: relative; z-index: 10; height: 90vh; display: flex; flex-direction: column; justify-content: center; }
        .page { display: none; }
        .page.active { display: block; text-align: center; }

        /* 결과 페이지는 스크롤이 필요할 수 있음 */
        #page-result.active { overflow-y: auto; height: 100%; padding-right: 10px; }
        #page-result::-webkit-scrollbar { width: 6px; }
        #page-result::-webkit-scrollbar-thumb { background: var(--btn-dark-navy); border-radius: 10px; }

        .main-logo { width: 100%; max-width: 380px; height: auto; margin-bottom: 25px; filter: brightness(0); opacity: 1.0; }
        .sub-logo { width: 100%; height: auto; margin-bottom: 20px; filter: brightness(0); display: block; }

        h2 { font-weight: 900; font-size: 1.6rem; text-align: left; margin-bottom: 30px; letter-spacing: -0.02em; padding: 0 10px; }

        .progress-container { width: 100%; margin-bottom: 30px; }
        .progress-info { display: flex; justify-content: space-between; font-weight: 900; font-size: 0.9rem; margin-bottom: 8px; }
        .main-progress-bg { width: 100%; height: 12px; background-color: var(--progress-bg-solid); border-radius: 6px; overflow: hidden; }
        .main-progress-fill { height: 100%; background-color: var(--progress-fill); transition: width 0.5s ease; }

        .opt-btn { 
            width: 100%; position: relative; background: transparent; border: 3px solid var(--text-black); 
            padding: 20px; margin-bottom: 15px; font-size: 1.1rem; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
            overflow: hidden; font-family: 'Noto Sans KR', sans-serif; 
            color: var(--text-black); font-weight: 900; border-radius: 6px; 
        }
        .opt-btn:disabled { cursor: default; opacity: 0.8; }
        .btn-fill { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background-color: var(--bar-bg); z-index: -1; transition: width 0.6s ease; }
        .stat-text { font-weight: 900; font-size: 1rem; pointer-events: none; }

        .start-p { font-weight: 900; font-size: 1.2rem; margin-bottom: 10px; color: var(--text-black); }
        .main-btn { margin-top: 25px; padding: 15px 45px; background: var(--btn-dark-navy); color: #fff; border: none; font-size: 1.2rem; font-weight: 900; cursor: pointer; letter-spacing: 0.1em; border-radius: 6px; }

        .result-category { font-weight: 900; font-size: 0.9rem; letter-spacing: 0.2em; color: rgba(0,0,0,0.7); display: block; }
        .result-name { font-weight: 900; font-size: 3.8rem; line-height: 1; margin: 5px 0; letter-spacing: -0.03em; }
        .character-img { width: 200px; height: 200px; margin: 15px auto; background-size: contain; background-repeat: no-repeat; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 70px; }
        #result-tag { font-weight: 900; font-size: 1.1rem; color: var(--text-black); border-bottom: 4px solid var(--text-black); display: inline-block; margin-top: 5px; padding-bottom: 5px; }

        .total-stats { margin: 30px 0; padding: 20px; background: rgb(220, 220, 220); border-radius: 10px; text-align: left; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; font-weight: 900; }
        .stat-bar-bg { flex-grow: 1; height: 8px; background: rgba(0,0,0,0.15); margin: 0 15px; }
        .stat-bar-fill { height: 100%; background: #000; width: 0%; transition: width 1s ease; }

        /* [추가] 방명록 스타일 */
        .guestbook-section { margin-top: 40px; text-align: left; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; border: 2px solid var(--text-black); }
        .guestbook-title { font-weight: 900; font-size: 1.2rem; margin-bottom: 15px; display: block; }
        .guestbook-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .guestbook-input { flex-grow: 1; padding: 12px; border: 2px solid var(--text-black); border-radius: 5px; font-family: inherit; font-weight: 700; outline: none; }
        .guestbook-btn { background: var(--text-black); color: white; border: none; padding: 0 20px; border-radius: 5px; font-weight: 900; cursor: pointer; }
        .guestbook-list { list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto; }
        .guestbook-item { background: white; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; font-weight: 700; font-size: 0.9rem; border-left: 5px solid var(--btn-dark-navy); color: #333; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="inner-content">
            <div id="page-start" class="page active">
                <img src="logo.png" alt="Logo" class="main-logo">
                <p class="start-p">나의 유행 소비 스타일 찾기</p>
                <button class="main-btn" onclick="nextPage('q1')">시작하기</button>
            </div>

            <div id="page-q1" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 1 / 4</span><span>25%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 25%;"></div></div>
                </div>
                <h2>Q1. 사고 싶은 게 출시되면 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q1', 'a')"><span>A. 바로 선점하는 게 좋다</span><div class="btn-fill" id="bar-q1-a"></div><span class="stat-text" id="text-q1-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'b')"><span>B. 혼자 고민을 깊게 한다</span><div class="btn-fill" id="bar-q1-b"></div><span class="stat-text" id="text-q1-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q1', 'c')"><span>C. 반응을 보고 결정한다</span><div class="btn-fill" id="bar-q1-c"></div><span class="stat-text" id="text-q1-c"></span></button>
            </div>

            <div id="page-q2" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 2 / 4</span><span>50%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 50%;"></div></div>
                </div>
                <h2>Q2. 스타일을 선택할 때..</h2>
                <button class="opt-btn" onclick="handleSelect('q2', 'a')"><span>A. 최신 트렌드를 따른다</span><div class="btn-fill" id="bar-q2-a"></div><span class="stat-text" id="text-q2-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'b')"><span>B. 나만의 기준을 따른다</span><div class="btn-fill" id="bar-q2-b"></div><span class="stat-text" id="text-q2-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q2', 'c')"><span>C. 집단의 스타일을 따른다</span><div class="btn-fill" id="bar-q2-c"></div><span class="stat-text" id="text-q2-c"></span></button>
            </div>

            <div id="page-q3" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 3 / 4</span><span>75%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 75%;"></div></div>
                </div>
                <h2>Q3. 나에게 더 중요한 것은..</h2>
                <button class="opt-btn" onclick="handleSelect('q3', 'a')"><span>A. 빠름과 새로움</span><div class="btn-fill" id="bar-q3-a"></div><span class="stat-text" id="text-q3-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'b')"><span>B. 취향과 기준</span><div class="btn-fill" id="bar-q3-b"></div><span class="stat-text" id="text-q3-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q3', 'c')"><span>C. 소속감과 관계</span><div class="btn-fill" id="bar-q3-c"></div><span class="stat-text" id="text-q3-c"></span></button>
            </div>

            <div id="page-q4" class="page">
                <img src="logo3.png" alt="sub-logo" class="sub-logo">
                <div class="progress-container">
                    <div class="progress-info"><span>Q 4 / 4</span><span>100%</span></div>
                    <div class="main-progress-bg"><div class="main-progress-fill" style="width: 100%;"></div></div>
                </div>
                <h2>Q4. 새로 산 아이템을 장착한 날, 나는..</h2>
                <button class="opt-btn" onclick="handleSelect('q4', 'a')"><span>A. 이미 다음 트렌드를 찾아보고 있다</span><div class="btn-fill" id="bar-q4-a"></div><span class="stat-text" id="text-q4-a"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'b')"><span>B. 남의 시선보다 내 만족에 집중한다</span><div class="btn-fill" id="bar-q4-b"></div><span class="stat-text" id="text-q4-b"></span></button>
                <button class="opt-btn" onclick="handleSelect('q4', 'c')"><span>C. SNS나 커뮤니티의 반응을 확인한다</span><div class="btn-fill" id="bar-q4-c"></div><span class="stat-text" id="text-q4-c"></span></button>
            </div>

            <div id="page-result" class="page">
                <div class="result-header">
                    <span class="result-category">TYPE</span>
                    <h1 id="result-name" class="result-name">NAME</h1>
                </div>
                <div class="character-img" id="char-img"></div>
                <div id="result-tag"></div>
                
                <div class="total-stats">
                    <span style="font-weight:900; font-size:0.95rem; display:block; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:12px;" id="total-count-text">현재 0명이 참여했습니다</span>
                    <div class="stat-row"><span>MAX</span><div class="stat-bar-bg"><div id="bar-total-a" class="stat-bar-fill"></div></div><span id="percent-total-a">0%</span></div>
                    <div class="stat-row"><span>HUGO</span><div class="stat-bar-bg"><div id="bar-total-b" class="stat-bar-fill"></div></div><span id="percent-total-b">0%</span></div>
                    <div class="stat-row"><span>KRU</span><div class="stat-bar-bg"><div id="bar-total-c" class="stat-bar-fill"></div></div><span id="percent-total-c">0%</span></div>
                </div>

                <div class="guestbook-section">
                    <span class="guestbook-title">GUESTBOOK</span>
                    <div class="guestbook-input-group">
                        <input type="text" id="guest-msg" class="guestbook-input" placeholder="짧은 소감을 남겨주세요!" maxlength="50">
                        <button class="guestbook-btn" onclick="sendGuestMsg()">남기기</button>
                    </div>
                    <ul id="guestbook-list" class="guestbook-list">
                        </ul>
                </div>

                <button class="main-btn" style="margin-bottom: 50px;" onclick="resetTest()">다시하기</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment, getDoc, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdSXJJ2grh1GNA_vusNJRm9djRpRH1ggo",
            authDomain: "hype-4bb91.firebaseapp.com",
            projectId: "hype-4bb91",
            storageBucket: "hype-4bb91.firebasestorage.app",
            messagingSenderId: "165143291283",
            appId: "1:165143291283:web:000e48b6091aa0a1c5b466",
            measurementId: "G-0Q8QJ5YDP4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let userAnswers = { a: 0, b: 0, c: 0 };
        let answerHistory = [];
        let isProcessing = false;

        window.nextPage = function(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active');
            isProcessing = false;
        };

        window.resetTest = function() {
            userAnswers = { a: 0, b: 0, c: 0 };
            answerHistory = [];
            isProcessing = false;
            document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = false);
            document.querySelectorAll('.btn-fill').forEach(fill => fill.style.width = "0%");
            document.querySelectorAll('.stat-text').forEach(txt => txt.innerText = "");
            document.getElementById('guest-msg').value = "";
            nextPage('start');
        };

        // [추가] 방명록 메시지 전송
        window.sendGuestMsg = async function() {
            const msgInput = document.getElementById('guest-msg');
            const msg = msgInput.value.trim();
            if(!msg) return;

            try {
                await addDoc(collection(db, "guestbook"), {
                    message: msg,
                    timestamp: serverTimestamp()
                });
                msgInput.value = "";
            } catch (e) { console.error(e); }
        };

        // [추가] 방명록 실시간 리스너
        const q = query(collection(db, "guestbook"), orderBy("timestamp", "desc"), limit(20));
        onSnapshot(q, (snapshot) => {
            const listEl = document.getElementById('guestbook-list');
            listEl.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                li.className = 'guestbook-item';
                li.innerText = data.message;
                listEl.appendChild(li);
            });
        });

        window.handleSelect = async function(qId, optId) {
            if (isProcessing) return;
            isProcessing = true;
            const currentButtons = document.querySelectorAll(`#page-${qId} .opt-btn`);
            currentButtons.forEach(btn => btn.disabled = true);
            userAnswers[optId]++;
            answerHistory.push(optId);
            const statsRef = doc(db, "surveyStats", qId);
            try {
                await updateDoc(statsRef, { [optId.toUpperCase()]: increment(1) });
                const snap = await getDoc(statsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    const total = (data.A||0)+(data.B||0)+(data.C||0);
                    ['a','b','c'].forEach(o => {
                        const count = data[o.toUpperCase()] || 0;
                        const p = total > 0 ? Math.round((count/total)*100) : 0;
                        const fillBar = document.getElementById(`bar-${qId}-${o}`);
                        if(fillBar) fillBar.style.width = p + "%";
                        const textSpan = document.getElementById(`text-${qId}-${o}`);
                        if(textSpan) textSpan.innerText = p + "%";
                    });
                }
                setTimeout(() => {
                    if (qId === 'q1') nextPage('q2');
                    else if (qId === 'q2') nextPage('q3');
                    else if (qId === 'q3') nextPage('q4');
                    else if (qId === 'q4') calculateResult();
                }, 1000);
            } catch (e) { console.error(e); isProcessing = false; }
        };

        async function calculateResult() {
            nextPage('result');
            const { a, b, c } = userAnswers;
            const nameEl = document.getElementById('result-name');
            const tagEl = document.getElementById('result-tag');
            const imgEl = document.getElementById('char-img');
            let finalType = "";
            const maxVal = Math.max(a, b, c);
            const candidates = [];
            if (a === maxVal) candidates.push('a');
            if (b === maxVal) candidates.push('b');
            if (c === maxVal) candidates.push('c');
            finalType = (candidates.length === 1) ? candidates[0] : answerHistory.find(ans => candidates.includes(ans));
            
            if (finalType === 'a') { nameEl.innerText = "MAX"; imgEl.innerText = "🐺"; tagEl.innerText = "유행의 선점"; }
            else if (finalType === 'b') { nameEl.innerText = "HUGO"; imgEl.innerText = "🦍"; tagEl.innerText = "취향의 독립"; }
            else { nameEl.innerText = "KRU"; imgEl.innerText = "🐆"; tagEl.innerText = "공감과 소속"; }

            const q1Snap = await getDoc(doc(db, "surveyStats", "q1"));
            if (q1Snap.exists()) {
                const d = q1Snap.data();
                const total = (d.A||0)+(d.B||0)+(d.C||0);
                document.getElementById('total-count-text').innerText = `현재 ${total}명이 참여했습니다`;
                ['A','B','C'].forEach(id => {
                    const count = d[id] || 0;
                    const p = total > 0 ? Math.round((count/total)*100) : 0;
                    document.getElementById(`bar-total-${id.toLowerCase()}`).style.width = p+"%";
                    document.getElementById(`percent-total-${id.toLowerCase()}`).innerText = p+"%";
                });
            }
        }
    </script>
</body>
</html>
